<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mockup - Tiempo de Detección</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-box-and-violin@3.6.0/build/Chart.BoxPlot.min.js"></script>
  <style>body{font-family:Inter,Arial;margin:24px;background:#f8fafc;color:#0f172a} .card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 6px 18px rgba(2,6,23,0.06);margin-bottom:18px}</style>
</head>
<body>
  <h2>Mockup: Tiempo Promedio de Detección</h2>
  <div class="card">
    <h4>Distribución por Subparcela (Boxplot)</h4>
    <canvas id="boxTime" height="160"></canvas>
  </div>
  <div class="card" style="display:flex;gap:12px;align-items:flex-start">
    <div style="flex:1"><h4>Histograma (ejemplo)</h4><canvas id="histTime" height="140"></canvas></div>
    <div style="width:340px"><h4>Tendencia (media diaria)</h4><canvas id="trendTime" height="140"></canvas></div>
  </div>

  <script>
  // Boxplot mock data (Chart.BoxPlot plugin expects arrays)
  const labels = ['S1','S2','S3','S4'];
  const boxData = [
    {min:5,q1:10,median:15,q3:20,max:40},
    {min:8,q1:12,median:17,q3:22,max:35},
    {min:3,q1:7,median:9,q3:14,max:28},
    {min:6,q1:9,median:12,q3:18,max:30}
  ];

  new Chart(document.getElementById('boxTime'), {
    type: 'boxplot',
    data: { labels, datasets: [{ label:'Tiempo (s)', backgroundColor:'#a7f3d0', borderColor:'#059669', data: boxData }] },
    options: { responsive:true, plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true}} }
  });

  // Histogram mock
  const histLabels = ['0-10','10-20','20-30','30-40','40+'];
  const histVals = [12,34,22,8,3];
  new Chart(document.getElementById('histTime'), { type:'bar', data:{ labels:histLabels, datasets:[{label:'Frecuencia',data:histVals,backgroundColor:'#60a5fa'}] }, options:{plugins:{legend:{display:false}}} });

  // Trend mock
  const tlabels=['2026-01-01','2026-01-08','2026-01-15','2026-01-22','2026-01-29'];
  const tvals=[14,13.5,15,14.2,13.8];
  new Chart(document.getElementById('trendTime'), { type:'line', data:{ labels:tlabels, datasets:[{label:'Media diaria (s)',data:tvals,borderColor:'#7c3aed',backgroundColor:'rgba(124,58,237,0.08)',fill:true}] }, options:{plugins:{legend:{display:false}}, scales:{x:{ticks:{maxRotation:0}}} } });
  </script>
</body>
</html>
